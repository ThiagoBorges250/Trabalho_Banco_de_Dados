{% extends 'core/base.html' %}
{% block title %}{{ titulo }} — Gerente de Notas{% endblock %}

{% block content %}
<div class="topbar">
  <h1 class="page-title"><i class="bi bi-book me-2"></i>{{ titulo }}</h1>
  <a href="{% url 'disciplina_list' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Voltar
  </a>
</div>

<div class="card" style="max-width:500px">
  <div class="card-body p-4">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
        <a href="{% url 'disciplina_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
